<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>증빙서류 검증 시스템</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header .subtitle { font-size: 13px; color: #8b95a5; margin-top: 2px; }
        .header .logo {
            width: 42px; height: 42px;
            background: #0f3460;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        /* Main layout */
        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 24px;
            padding: 24px 40px;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 82px);
        }

        /* Left panel */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon { font-size: 18px; }

        /* Upload area */
        .upload-area {
            border: 2px dashed #d0d5dd;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafbfc;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #0f3460;
            background: #f0f4ff;
        }
        .upload-area .icon { font-size: 36px; margin-bottom: 8px; }
        .upload-area p { color: #667085; font-size: 14px; }
        .upload-area .filename {
            margin-top: 10px;
            font-weight: 600;
            color: #0f3460;
            font-size: 14px;
        }

        /* Settings */
        .setting-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .setting-row label {
            font-size: 14px;
            color: #344054;
            min-width: 80px;
        }
        .setting-row input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        .setting-row .unit { font-size: 13px; color: #667085; }

        /* Button */
        .btn-analyze {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-analyze:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-analyze:disabled {
            background: #d0d5dd;
            cursor: not-allowed;
            transform: none;
        }

        /* Right panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Traffic light */
        .traffic-light-container {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 20px 28px;
        }
        .traffic-light {
            display: flex;
            gap: 12px;
            background: #1a1a2e;
            padding: 10px 16px;
            border-radius: 40px;
        }
        .light {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #2a2a3e;
            transition: all 0.4s;
        }
        .light.red.active { background: #ef4444; box-shadow: 0 0 16px #ef4444aa; }
        .light.yellow.active { background: #f59e0b; box-shadow: 0 0 16px #f59e0baa; }
        .light.green.active { background: #22c55e; box-shadow: 0 0 16px #22c55eaa; }

        .verdict {
            flex: 1;
        }
        .verdict .status {
            font-size: 18px;
            font-weight: 700;
        }
        .verdict .detail {
            font-size: 14px;
            color: #667085;
            margin-top: 4px;
        }
        .status.valid { color: #16a34a; }
        .status.expired { color: #dc2626; }
        .status.unknown { color: #d97706; }

        /* Date info */
        .date-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            padding: 0 28px 24px;
        }
        .date-box {
            background: #f8f9fb;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .date-box .label { font-size: 12px; color: #667085; margin-bottom: 6px; }
        .date-box .value { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        .date-box .value.red { color: #dc2626; }
        .date-box .value.green { color: #16a34a; }

        /* Extracted content */
        .extracted-content {
            flex: 1;
            min-height: 300px;
        }
        .content-body {
            max-height: 600px;
            overflow-y: auto;
            padding: 16px;
            background: #f8f9fb;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .content-body.html-view {
            white-space: normal;
        }
        .content-body.html-view table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
        }
        .content-body.html-view td,
        .content-body.html-view th {
            border: 1px solid #d0d5dd;
            padding: 6px 10px;
            font-size: 13px;
        }

        /* Tab buttons */
        .tab-buttons {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .tab-btn {
            padding: 4px 12px;
            border: 1px solid #d0d5dd;
            background: white;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            color: #667085;
        }
        .tab-btn.active {
            background: #1a1a2e;
            color: white;
            border-color: #1a1a2e;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }
        .loading.show { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #0f3460;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .placeholder {
            text-align: center;
            padding: 80px 20px;
            color: #98a2b3;
        }
        .placeholder .icon { font-size: 48px; margin-bottom: 12px; }
        .placeholder p { font-size: 15px; }

        /* All dates list */
        .all-dates {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f8f9fb;
            border-radius: 10px;
        }
        .all-dates h4 { font-size: 13px; color: #667085; margin-bottom: 8px; }
        .all-dates .date-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        .all-dates .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.high { background: #dcfce7; color: #16a34a; }
        .badge.low { background: #fef3c7; color: #d97706; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📋</div>
        <div>
            <h1>증빙서류 검증 시스템</h1>
            <div class="subtitle">AI 기반 증빙서류 발급일자 자동 검증 · Upstage Document AI</div>
        </div>
    </div>

    <div class="container">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="card">
                <div class="card-title"><span class="icon">📄</span> 서류 업로드</div>
                <div class="upload-area" id="uploadArea">
                    <div class="icon">📁</div>
                    <p>클릭하거나 파일을 드래그하세요</p>
                    <p style="font-size:12px; color:#98a2b3; margin-top:4px;">PDF, JPG, PNG 지원</p>
                    <div class="filename" id="fileName"></div>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.bmp,.tiff,.heic" hidden>
            </div>

            <div class="card">
                <div class="card-title"><span class="icon">⚙️</span> 검증 설정</div>
                <div class="setting-row">
                    <label>기준일</label>
                    <input type="number" id="thresholdDays" value="30" min="1" max="365">
                    <span class="unit">일 이내</span>
                </div>
                <p style="font-size:12px; color:#98a2b3;">발급일로부터 기준일 이내 발급 여부를 검증합니다.</p>
            </div>

            <button class="btn-analyze" id="btnAnalyze" disabled>🔍 분석 시작</button>

            <!-- Date verification result -->
            <div class="card" id="dateResultCard" style="display:none;">
                <div class="card-title"><span class="icon">📅</span> 발급일자 검증 결과</div>
                <div id="allDatesArea"></div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <!-- Traffic Light -->
            <div class="card" id="signalCard" style="display:none;">
                <div class="traffic-light-container">
                    <div class="traffic-light">
                        <div class="light red" id="lightRed"></div>
                        <div class="light yellow" id="lightYellow"></div>
                        <div class="light green" id="lightGreen"></div>
                    </div>
                    <div class="verdict">
                        <div class="status" id="verdictStatus"></div>
                        <div class="detail" id="verdictDetail"></div>
                    </div>
                </div>
                <div class="date-info-grid" id="dateInfoGrid" style="display:none;">
                    <div class="date-box">
                        <div class="label">발급일</div>
                        <div class="value" id="issueDateVal">-</div>
                    </div>
                    <div class="date-box">
                        <div class="label">경과일수</div>
                        <div class="value" id="elapsedVal">-</div>
                    </div>
                    <div class="date-box">
                        <div class="label">기준</div>
                        <div class="value" id="thresholdVal">-</div>
                    </div>
                </div>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Upstage AI로 문서를 분석하고 있습니다...</p>
                <p style="font-size:12px; color:#98a2b3; margin-top:8px;">OCR + 텍스트 추출 + 날짜 검증</p>
            </div>

            <!-- Placeholder -->
            <div class="card placeholder" id="placeholder">
                <div class="icon">🔎</div>
                <p>왼쪽에서 증빙서류를 업로드하고<br>분석 버튼을 눌러주세요.</p>
            </div>

            <!-- Extracted content -->
            <div class="card extracted-content" id="contentCard" style="display:none;">
                <div class="card-title">
                    <span class="icon">📝</span> 추출된 문서 내용
                    <div class="tab-buttons">
                        <button class="tab-btn active" data-view="html">HTML</button>
                        <button class="tab-btn" data-view="text">텍스트</button>
                    </div>
                </div>
                <div class="content-body html-view" id="contentBody"></div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const btnAnalyze = document.getElementById('btnAnalyze');
        const loading = document.getElementById('loading');
        const placeholder = document.getElementById('placeholder');

        let selectedFile = null;
        let extractedText = '';
        let extractedHtml = '';

        // Upload area
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            btnAnalyze.disabled = false;
        }

        // Analyze
        btnAnalyze.addEventListener('click', async () => {
            if (!selectedFile) return;

            const thresholdDays = document.getElementById('thresholdDays').value;

            // Show loading
            loading.classList.add('show');
            placeholder.style.display = 'none';
            document.getElementById('signalCard').style.display = 'none';
            document.getElementById('contentCard').style.display = 'none';
            document.getElementById('dateResultCard').style.display = 'none';
            btnAnalyze.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('threshold_days', thresholdDays);

            try {
                const resp = await fetch('/api/analyze', { method: 'POST', body: formData });
                const data = await resp.json();

                loading.classList.remove('show');
                btnAnalyze.disabled = false;

                if (!data.success) {
                    alert('분석 실패: ' + data.error);
                    placeholder.style.display = '';
                    return;
                }

                // Store content
                extractedText = data.extracted_text;
                extractedHtml = data.extracted_html;

                // Traffic light
                showSignal(data.verification, data.date_info, data.threshold_days, data.today);

                // Content
                showContent(extractedHtml, 'html');

                // Date details
                showDateDetails(data.date_info);

            } catch (err) {
                loading.classList.remove('show');
                btnAnalyze.disabled = false;
                alert('오류 발생: ' + err.message);
                placeholder.style.display = '';
            }
        });

        function showSignal(verification, dateInfo, thresholdDays, today) {
            const card = document.getElementById('signalCard');
            card.style.display = '';

            // Reset lights
            document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));

            // Activate light
            const signal = verification.signal;
            document.getElementById('light' + signal.charAt(0).toUpperCase() + signal.slice(1)).classList.add('active');

            // Verdict
            const status = document.getElementById('verdictStatus');
            const detail = document.getElementById('verdictDetail');
            status.className = 'status ' + verification.status;

            if (verification.status === 'valid') {
                status.textContent = '✅ 기준 충족';
            } else if (verification.status === 'expired') {
                status.textContent = '❌ 기준 초과';
            } else {
                status.textContent = '⚠️ 확인 필요';
            }
            detail.textContent = verification.message;

            // Date info grid
            const grid = document.getElementById('dateInfoGrid');
            if (dateInfo.found) {
                grid.style.display = '';
                document.getElementById('issueDateVal').textContent = dateInfo.issue_date;
                const elapsed = document.getElementById('elapsedVal');
                elapsed.textContent = verification.days_elapsed !== null ? verification.days_elapsed + '일' : '-';
                elapsed.className = 'value ' + (verification.status === 'valid' ? 'green' : verification.status === 'expired' ? 'red' : '');
                document.getElementById('thresholdVal').textContent = thresholdDays + '일';
            } else {
                grid.style.display = 'none';
            }
        }

        function showDateDetails(dateInfo) {
            const card = document.getElementById('dateResultCard');
            const area = document.getElementById('allDatesArea');

            if (dateInfo.all_dates && dateInfo.all_dates.length > 0) {
                card.style.display = '';
                let html = '<div class="all-dates"><h4>문서에서 발견된 날짜들</h4>';
                dateInfo.all_dates.forEach(d => {
                    const badge = d.confidence === 'high' ? 'high' : 'low';
                    const label = d.confidence === 'high' ? '높음' : '낮음';
                    html += `<div class="date-item">
                        <span>${d.date} ${d.keyword ? '(' + d.keyword + ')' : ''}</span>
                        <span class="badge ${badge}">신뢰도: ${label}</span>
                    </div>`;
                });
                html += '</div>';
                area.innerHTML = html;
            } else {
                card.style.display = '';
                area.innerHTML = '<p style="color:#98a2b3; font-size:13px; padding:8px;">문서에서 날짜를 찾지 못했습니다.</p>';
            }
        }

        function showContent(content, mode) {
            const card = document.getElementById('contentCard');
            const body = document.getElementById('contentBody');
            card.style.display = '';

            if (mode === 'html') {
                body.classList.add('html-view');
                body.innerHTML = content || '<em>HTML 내용 없음</em>';
            } else {
                body.classList.remove('html-view');
                body.textContent = content || '텍스트 내용 없음';
            }
        }

        // Tab buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                showContent(view === 'html' ? extractedHtml : extractedText, view);
            });
        });
    </script>
</body>
</html>
